name: vitamin_d_sensor
description: Smart Vitamin D Monitoring System for South Asian populations
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — upgraded to compatible versions
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  firebase_analytics: ^11.3.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # State Management
  provider: ^6.1.1

  # USB Serial — Android
  usb_serial: ^0.4.0

  # USB Serial — Desktop (Windows / macOS / Linux)
#  flutter_libserialport: ^0.3.0

  # Networking
  dio: ^5.4.0

  # Location & GPS
  geolocator: ^11.0.0

  # Charts
  fl_chart: ^0.66.2

  # Local Storage (offline cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF generation (doctor reports)
  pdf: ^3.10.7
  printing: ^5.12.0

  # UI
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.2.1
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/